<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${cliente.id != null} ? 'Editar Cliente' : 'Novo Cliente'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow-lg mx-auto" style="max-width: 500px;">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0" th:text="${cliente.id != null} ? 'Editar Cliente' : 'Novo Cliente'">Cadastro</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/clientes/salvar}" method="post">
                <input type="hidden" name="id" th:if="${cliente.id != null}" th:value="${cliente.id}">
                <div class="mb-3">
                    <label class="form-label">Nome:</label>
                    <input type="text" name="nome" th:value="${cliente.nome}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">CPF:</label>
                    <input type="text" name="cpf" th:value="${cliente.cpf}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">E-mail:</label>
                    <input type="email" name="email" th:value="${cliente.email}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Telefone:</label>
                    <input type="text" name="telefone" th:value="${cliente.telefone}" class="form-control" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">Confirmar e Salvar</button>
                    <a href="/clientes" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
